<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}" />
  <link rel="icon" href="{{ '/assets/images/logos/favicon.svg' | relative_url }}" type="image/svg+xml" />
  <link rel="icon" href="{{ '/assets/images/logos/favicon-32x32.png' | relative_url }}" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="{{ '/assets/images/logos/apple-touch-icon.png' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}" />
  <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  {% seo %}
</head>
<body data-theme="{{ page.theme | default: 'metaphysics' }}" id="top">
  <a class="skip-link" href="#main-content">Skip to content</a>
  {% include site-header.html %}
  <main id="main-content">
    {{ content }}
  </main>
  {% include site-footer.html %}
</body>
</html>
