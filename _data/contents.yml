# Part-level table of contents for each book
# Mirrors the Amazon A+ "From the Publisher" content
# Keyed by book slug (matches _books/*.md slug field)

categorical-foundations:
  parts:
    - number: "I"
      title: "Prologue"
      description: "Motivation and reading guide: the foundations problem, why a structure-first approach, and how Book I sets up Book II."
    - number: "II"
      title: "The Core Axioms of τ"
      description: "Signature and axioms of Tτ; canonical model; generators/orbits and the basic categorical universe."
    - number: "III"
      title: "Label-Independence"
      description: "Objects defined by behavior, not naming; rigidity and categoricity results; interpretive preview toward Book II."
    - number: "IV"
      title: "Internal Set Theory"
      description: "Sets inside τ: membership from divisibility, decomposition trees, Cayley-graph structure, and Boolean fragments."
    - number: "V"
      title: "Metric Geometry"
      description: "Full word-metric development; Cayley-graph theorems; canonical representations and categoricity as geometry."
    - number: "VI"
      title: "Total Order"
      description: "From metric to total order; effective comparison procedures; decidable core predicates and computability framing."
    - number: "VII"
      title: "The Tarski Program"
      description: "Euclidean geometry via τ: primitives, betweenness/congruence, verification of Tarski's axioms, and geometric consequences."
    - number: "VIII"
      title: "Topos & Self-Enrichment"
      description: "Yoneda and presheaves; topos viewpoint; internal logic; self-enrichment and countability considerations."
    - number: "IX"
      title: "Internal Arithmetic"
      description: "Arithmetic tower inside τ: ℕτ, ℤτ, ℚτ, ℝτ; computable reals and the number-system progression."
    - number: "X"
      title: "The Canonical Calibration"
      description: "Master invariant ιτ; emergence of constants and calibration dictionary; complex/quaternionic extensions and bridge forward."
    - number: "XI"
      title: "Topological Foundations"
      description: "Ultrametric and solenoidal topologies; τ as Stone space; 0D/1D/2D hierarchy and links to geometry/physics."
    - number: "XII"
      title: "τ-Computation"
      description: "τ-Tower Machine, observation-finiteness, τ-complexity classes, and the Interface Width Principle."
    - number: "XIII"
      title: "Foundations"
      description: "Comparisons to classical foundations; constructive/decidable scope; diagnostics, limitations, and research program framing."
    - number: "XIV"
      title: "Bridge to Book II"
      description: "Preview of τ \u201Cin the large\u201D: τ³ fibration, compactification/lemniscate boundary, and τ-holomorphy themes."

categorical-holomorphy:
  parts:
    - number: "I"
      title: "Prologue"
      description: "Sets the stage for categorical holomorphy: what changes from Book I, key questions, roadmap, and prerequisites."
    - number: "II"
      title: "The τ³ Fibration"
      description: "The geometric heart of the book: τ³ as a fibration with base and fiber; coordinates, metrics, and structural role."
    - number: "III"
      title: "The Lemniscate"
      description: "Why compactification is needed; the canonical boundary shape; the \u201Clemniscate\u201D L = S¹ ∨ S¹ and its role at infinity."
    - number: "IV"
      title: "The Spectral Algebra"
      description: "Characters on the boundary; CR-compatible modes; ring/convolution structure; two-lobe decomposition and finiteness."
    - number: "V"
      title: "τ-CR Equations & Holomorphy"
      description: "τ-analogue of Cauchy–Riemann; discrete Fueter operator; τ-holomorphic functions and the central holomorphy criterion."
    - number: "VI"
      title: "Hartogs & Liouville"
      description: "Extension and boundedness principles in τ³: Hartogs-type extension, Liouville-type statements, and maximum principles."
    - number: "VII"
      title: "Advanced Holomorphy"
      description: "Residues, poles, Laurent expansions, meromorphic functions, analytic continuation, and a sheaf-theoretic viewpoint."
    - number: "VIII"
      title: "Number Theory"
      description: "Spectral zeta connection; modular forms and L-functions in τ-language; arithmetic applications and open problems."
    - number: "IX"
      title: "Emergent Physics"
      description: "Physical interpretation: τ³ as a spacetime-like arena; holomorphic functions as fields; boundary observables and symmetries."
    - number: "X"
      title: "Categoricity"
      description: "Uniqueness results for the holomorphic structure; universal properties; why the τ³ profile is structurally forced within the framework."
    - number: "XI"
      title: "τ-Manifold Geometry"
      description: "Generalization to τ-manifolds: τ-calculus, sheaves/cohomology, connections/curvature, Hodge theory, and gauge structures."
    - number: "XII"
      title: "Synthesis and Bridge"
      description: "Summary of major results, open questions, and the bridge forward from holomorphy to the spectral program of Book III."

categorical-spectrum:
  parts:
    - number: "I"
      title: "The Categorical White Light"
      description: "Introduces the central dictionary: (×, ∧)-tension, the character lattice ℤ², the lemniscate geometry (S¹ ∨ S¹), and the universal operator H∞ as the stage for the \u201Cforces.\u201D"
    - number: "II"
      title: "The Finite Force"
      description: "P vs. NP: A τ-effective complexity lens: encodings, Cayley-graph/word-metric complexity, admissibility/width constraints, and explicit scope notes (including cryptography and what is not claimed)."
    - number: "III"
      title: "The Spatial Force"
      description: "Poincaré Conjecture: A spectral/topological viewpoint on 3D structure: τ³ geometry, characters/duality, flow mechanisms, and a disciplined comparison to established results."
    - number: "IV"
      title: "The Temporal Force"
      description: "Riemann Hypothesis: Operator and zeta-language: τ¹/τ²/τ³ integration, lemniscate spectral theory, correspondence mechanisms, and τ-effective explicit formulas with computational/certification sections."
    - number: "V"
      title: "The Eternal Force"
      description: "Hodge Conjecture: Complex structure, (p,q)-decomposition and spectral Hodge viewpoint; finite spectral support mechanisms and a τ-constrained path toward algebraicity claims (with scope notes)."
    - number: "VI"
      title: "The Rational Force"
      description: "BSD Conjecture: Elliptic curves and L-functions in τ-language: spectral determinant templates, rank/multiplicity viewpoints, and τ-visible sector comparisons."
    - number: "VII"
      title: "The Existential Force"
      description: "Yang–Mills Mass Gap: Gauge symmetry and spectrum via τ-effective truncations: operators, self-adjointness, spectral gaps, and what the model resolves (and does not)."
    - number: "VIII"
      title: "The Regular Force"
      description: "Navier–Stokes Regularity: Fluid dynamics through spectral control: truncated sectors, energy/enstrophy bounds, regularity mechanisms, and explicit scope relative to the classical Clay statement."
    - number: "IX"
      title: "The Spectral Force"
      description: "Langlands Program: A \u201Cprism\u201D lens connecting arithmetic and automorphic structure: L-functions as spectral determinants, representations, and functoriality viewpoints on (∞, 𝓛)."
    - number: "X"
      title: "The Unified Vision"
      description: "Recombines the lenses: the cascade schema, the role of ℤ² and (∞, 𝓛), and how the eight \u201Cforces\u201D fit into a single structural narrative."

categorical-microcosm:
  parts:
    - number: "I"
      title: "The Ontic Substrate"
      description: "Builds the \u201Cstage\u201D: Cayley graph foundations, proto-time, energy/entropy concepts, τ³ fibration, and the boundary/lemniscate viewpoint—ending with the complete arena before \u201Cactors\u201D appear."
    - number: "II"
      title: "Holomorphic Quantization"
      description: "Introduces the CR-structure and quantization mechanism; develops \u201Cquantum mechanics without particles\u201D and reframes measurement as mode selection—preparing the first bound pattern."
    - number: "III"
      title: "The Neutron"
      description: "Uses β⁻ decay as a translation engine: emergence of proton/electron modes, co-rotor dynamics, weak mediation, decay probabilities, and neutrinos as τ¹ modes."
    - number: "IV"
      title: "Quantum Dynamics"
      description: "The first atom as a calibration hub: photon as null intertwiner, EM coupling/holonomy, α-derivation and calibration cascade, spectral lines, fine structure, and higher-order effects."
    - number: "V"
      title: "Hydrogen"
      description: "Builds the interaction dictionary: neutrinos, quarks, strong force as τ² saturation, gluons/connection modes, confinement/closure, electroweak structure, Z and Higgs as modes, and coupling cascades."
    - number: "VI"
      title: "Interactions"
      description: "From nuclei to the periodic table: the \u201Cdonut ladder,\u201D shell/magic-number structure, stability curves (helium, α-particle, iron peak), heavy elements, decay modes, and stellar nucleosynthesis."
    - number: "VIII"
      title: "Molecules"
      description: "Chemistry as structured mode sharing: bond types, orbitals in τ-language, molecular geometry, and the bridge from atomic structure toward living systems."
    - number: "IX"
      title: "Laws as Diagrams"
      description: "Recasts physical law as compositional structure: τ-Feynman diagrams as morphisms, self-enrichment, symmetries as functors, conservation as naturality, and coherence/anomalies."
    - number: "X"
      title: "Back to the Zoo"
      description: "A closing translation layer: Standard Model summary, τ³ ↔ SM dictionary, ontic vs non-ontic classification, predictions vs retrodictions, what the framework adds, and the road to gravity (Book V)."

categorical-macrocosm:
  parts:
    - number: "I"
      title: "The Cosmic Stack"
      description: "Sets the macrocosm stage: two-clock language (substrate ticks vs proper time), epoch transitions, and the \u201Cstack\u201D that organizes later parts and datasets (CMB/CvB)."
    - number: "II"
      title: "Cosmic Light"
      description: "Operational distance and redshift as readout/refinement drift; photons as null bookkeeping; reinterpretation of the distance ladder and \u201Cdark sector\u201D language with explicit dataset contracts."
    - number: "III"
      title: "Gravity as Geometry"
      description: "Rebuilds gravity as geometric readout: Lorentz structure, emergent metric/connection/curvature toolkit, weak-field limit, nonlinear consistency, horizons, and the \u201Cno point-mass\u201D stance."
    - number: "IV"
      title: "Cosmic Topology"
      description: "Topology enters explicitly: two relaxation channels (geometric vs topological), handles/macro-donuts, holonomy and Wilson loops, topological lensing channels, and gravitational-wave ontology framing."
    - number: "V"
      title: "Galaxies & Black Holes"
      description: "Galaxies as relational objects; formation without separate dark ingredients (within the framework); rotation-curve families; compact-object ladder; accretion/jets/AGN; mergers and EHT interpretation."
    - number: "VI"
      title: "Solar System Physics"
      description: "Why classical mechanics works as a large-scale readout: closed-orbit inertia, Kepler from rotational flux, solar-system calibration tests, and a layered view of Sun–planet boundary dynamics."
    - number: "VII"
      title: "Condensed Matter"
      description: "Macro-thermodynamics and heat transfer re-read; waves in matter; phase diagrams; solids as constraint lattices; bands/metals/insulators; magnetism and \u201Cno monopoles\u201D; superconductors/superfluids and rare transduction pathways."
    - number: "VIII"
      title: "Correspondence & Closure"
      description: "A correspondence map to orthodox stacks: QFT and renormalization as readout language, SR/GR dictionaries, Λ/dark sector/vacuum reinterpretation, closure/backreaction, frontier program comparisons, and falsifiable seams."
    - number: "IX"
      title: "Synthesis & Horizon"
      description: "What Book V delivers, what remains open, and how the macrocosm connects forward into life and mind (Book VI), with a final synthesis and horizon statement."

categorical-life:
  parts:
    - number: "I"
      title: "The Question of Life"
      description: "Surveys classical definitions and their edge cases; proposes a structural alternative; covers life's emergence, LUCA, and a disciplined set of life-characteristics."
    - number: "II"
      title: "Life as Physics"
      description: "Maps the program's core \u201Cforces\u201D into biology: energetics, circulation, gradients, coding, folding, fluid regularity, and optimization—plus falsifiable predictions."
    - number: "III"
      title: "Life as Engine"
      description: "Life as energy conversion: photosynthesis, metabolism, ATP, circadian rhythms and sleep, and the \u201Cengine\u201D roles of plants and fungi (with cross-references)."
    - number: "IV"
      title: "Life as Structure"
      description: "From molecules to cells: molecular classes, membranes and compartmentalization, protein folding dynamics, domains of life, division, and multicellularity as structured cooperation."
    - number: "V"
      title: "Life as Information"
      description: "Genetic code structure, replication/transcription, regulation, and development; information integrity, error correction, and the link between coding and morphological constraints."
    - number: "VI"
      title: "Life as Optimization"
      description: "Evolution as a constrained search: selection, mutation, fitness landscapes, speciation, ecosystems, and symbiosis—treated as multi-scale optimization and stability."
    - number: "VII"
      title: "Life as Identity"
      description: "Identity, repair, and continuity: immune recognition, aging, death/decomposition, healing/regeneration, and metamorphosis—pattern continuity under transformation."
    - number: "VIII"
      title: "Life as Computation"
      description: "Nervous systems, learning, communication and language, and consciousness as integration—connecting biological computation to the series' broader framework."
    - number: "IX"
      title: "Life at Cosmic Scale"
      description: "Extends the life-criteria to cosmic systems: a \u201Clife spectrum\u201D across scales, testable parallels, and a forward bridge into Book VII (meaning and mind)."

categorical-metaphysics:
  parts:
    - number: "I"
      title: "Categorical Ontology"
      description: "A relational ontology grounded in τ and τ³: internal domains, boundary/interface (lemniscate), law/regularity, causation, modality, identity over time, and mereology."
    - number: "II"
      title: "Categorical Phenomenology"
      description: "Knowledge as sections over covers; justification as gluing constraints; perception/experience as structured mapping; time-consciousness, embodiment, and intersubjectivity."
    - number: "III"
      title: "Categorical Aesthetics"
      description: "Beauty as invariance and stability; elegance as minimal tension; style/genre as constraints—then applications: golden ratio, fractals, music, visual composition, architecture, and creative refinement."
    - number: "IV"
      title: "Categorical Language"
      description: "What language adds (and costs); subsymbolic layers; temporalization; self-enrichment; syntax–semantics collapse; reference and pragmatics; translation, drift/repair; public language (law/justice); LLMs and grounding."
    - number: "V"
      title: "Categorical Logic"
      description: "Scale-sensitive logic (Boolean vs Bayesian), internal randomness, probability as representation, inference as structural necessity, truthmakers, modality, and controlled treatment of contradiction."
    - number: "VI"
      title: "Categorical Ethics"
      description: "Dignity as a structural invariant; categorical imperative as gluing; fairness/action protocols; ambiguity/monodromy; ethical tests; long-term ethics (animals, future generations) and AI."
    - number: "VII"
      title: "Categorical Societies"
      description: "Social ontology via spheres/bubbles/foams; scale limits (communities vs cities); architecture as cultural mirroring; generations and drift; capital/networks; overload and fragmentation; coordination at planetary scale."
    - number: "VIII"
      title: "Categorical Mind"
      description: "Mind as internal topos; self as narrative functor; consciousness as global integration; intentionality and qualia; metacognition and self-awareness; free will as constrained branching; minds vs machines/LLMs; extended mind."
